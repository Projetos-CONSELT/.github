<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Projetos CONSELT — Dashboard</title>
	<style>
		:root{
			--bg:#0d1117; --panel:#161b22; --muted:#9096a0; --accent:#d94b2b; --card-radius:12px;
		}
		html,body{height:100%;}
		body{margin:0;font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;background:var(--bg);color:#e6edf3}
		.container{max-width:1100px;margin:24px auto;padding:16px}
		header{display:flex;gap:16px;align-items:center}
		header img{height:56px}
		header .titles{line-height:1}
		header h1{margin:0;font-size:1.25rem}
		header p{margin:0;color:var(--muted);font-size:0.95rem}
		.links{margin-left:auto;display:flex;gap:8px}
		.links a{color:var(--muted);text-decoration:none;font-size:0.9rem}

		.controls{display:flex;gap:12px;align-items:center;margin-top:16px;flex-wrap:wrap}
		.search{flex:1;min-width:220px}
		input[type="search"]{width:100%;padding:10px;border-radius:10px;border:1px solid #23272b;background:transparent;color:inherit}
		.filters{display:flex;gap:8px;flex-wrap:wrap}
		.badge-btn{background:transparent;border:1px solid #25303a;color:var(--muted);padding:8px 10px;border-radius:999px;cursor:pointer}
		.badge-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

		.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:20px}
		.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border:1px solid #20262b;padding:14px;border-radius:var(--card-radius);transition:transform .18s,box-shadow .18s}
		.card:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(0,0,0,0.6)}
		.meta{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:0.875rem;margin-bottom:8px}
		.title{font-weight:600;margin:0 0 6px 0}
		.desc{color:var(--muted);font-size:0.95rem;margin-bottom:10px;min-height:40px}
		.langs{display:flex;gap:8px;flex-wrap:wrap}
		.pill{background:#0b1114;padding:6px 8px;border-radius:8px;border:1px solid #1b2226;font-size:0.82rem}
		.actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
		.btn{background:var(--accent);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none}
		footer{margin-top:26px;color:var(--muted);font-size:0.9rem;text-align:center}

		.empty{padding:40px;border:1px dashed #263238;border-radius:12px;color:var(--muted);text-align:center}

		@media(max-width:600px){header img{height:48px}.links{display:none}}
	</style>
	<!-- Ícones simples via emoji; sem frameworks externos -->
	<script>
		// Funções utilitárias e renderização do dashboard
		const ORG_DEFAULT = 'Projetos-CONSELT';
		const ACCENT = getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#d94b2b';

		// Detecta área de serviço com base em topics (preferência) e nome como fallback
		function detectArea(topics = [], name = ''){
			const t = (topics||[]).map(x=>x.toLowerCase());
			const n = (name||'').toLowerCase();
			const areas = [
				{key:'web-dev', emoji:'🌐', label:'Desenvolvimento Web'},
				{key:'luminotecnica', emoji:'💡', label:'Luminotécnica'},
				{key:'itel', emoji:'⚡', label:'ITEL'},
				{key:'automacao-residencial', emoji:'🏠', label:'Automação Residencial'},
			];
			// checar topics
			for(const a of areas) if(t.includes(a.key)) return a;
			// fallback por nome
			if(/web|site|wordpress|woocommerce|landing/.test(n)) return areas[0];
			if(/lumin|dialux|ilumina|lighting/.test(n)) return areas[1];
			if(/itel|eletric|electr|autocad|revit/.test(n)) return areas[2];
			if(/automacao|automação|automation|esp32|arduino|home/.test(n)) return areas[3];
			return {key:'outros', emoji:'📁', label:'Outros'};
		}

		// Formata nome do repositório
		function formatName(name){ return name.replace(/[_-]+/g,' ').replace(/\b(\w)/g,m=>m.toUpperCase()); }

		async function ghFetch(url, token, accept){
			const headers = {'Accept': accept || 'application/vnd.github.v3+json'};
			if(token) headers['Authorization']= 'token '+token;
			const res = await fetch(url,{headers});
			if(!res.ok){
				const txt = await res.text().catch(()=>res.statusText);
				throw new Error(`${res.status} ${res.statusText} - ${txt}`);
			}
			return res.json();
		}

		// Renderiza todos os cards
		async function loadProjects(token){
			const listEl = document.getElementById('grid');
			const statusEl = document.getElementById('status');
			listEl.innerHTML='';
			statusEl.textContent='Carregando repositórios...';
			try{
				const repos = await ghFetch(`https://api.github.com/orgs/${ORG_DEFAULT}/repos?per_page=100`, token);
				if(!repos || repos.length===0){
					listEl.innerHTML = '<div class="empty">Nenhum repositório encontrado para a organização.</div>';
					statusEl.textContent = 'Nenhum repositório.';
					return repos;
				}

				// obter topics por repositório (usa mercy preview)
				const detailed = await Promise.all(repos.map(async r=>{
					try{
						const topics = await ghFetch(`https://api.github.com/repos/${r.owner.login}/${r.name}/topics`, token, 'application/vnd.github.mercy-preview+json');
						return {...r, topics: topics.names||[]};
					}catch(e){ return {...r, topics: []}; }
				}));

				// armazenar dados
				window.__PROJECTS = detailed.map(r=>({
					name: r.name,
					title: formatName(r.name),
					desc: r.description || '',
					lang: r.language || '—',
					updated: r.pushed_at || r.updated_at || r.created_at,
					stars: r.stargazers_count || 0,
					forks: r.forks_count || 0,
					html_url: r.html_url,
					topics: r.topics||[],
					area: detectArea(r.topics||[], r.name)
				}));

				renderGrid(window.__PROJECTS);
				statusEl.textContent = `Carregados ${window.__PROJECTS.length} repositórios.`;
				return window.__PROJECTS;
			}catch(err){
				console.error(err);
				statusEl.textContent = 'Erro ao carregar repositórios: '+err.message;
				document.getElementById('grid').innerHTML = `<div class="empty">Erro ao consultar a API do GitHub. Verifique o token ou tente novamente mais tarde.</div>`;
				return [];
			}
		}

		function renderGrid(items){
			const grid = document.getElementById('grid');
			grid.innerHTML='';
			for(const it of items){
				const card = document.createElement('article'); card.className='card';
				card.innerHTML = `
					<div class="meta"><span class="pill">${it.area.emoji} ${it.area.label}</span><span style="margin-left:auto">${new Date(it.updated).toLocaleDateString('pt-BR')}</span></div>
					<h3 class="title">${it.title}</h3>
					<div class="desc">${it.desc||'<span style="color:var(--muted)">Sem descrição</span>'}</div>
					<div class="langs">
						<div class="pill">🧾 ${it.lang}</div>
						<div class="pill">⭐ ${it.stars} &nbsp; 🍴 ${it.forks}</div>
					</div>
					<div class="actions">
						<a class="btn" href="${it.html_url}" target="_blank" rel="noopener">Ver Repositório</a>
						<div style="color:var(--muted);font-size:0.85rem">Tópicos: ${ (it.topics||[]).slice(0,3).join(', ') || '—' }</div>
					</div>
				`;
				grid.appendChild(card);
			}
		}

		// filtros e busca
		function setupControls(){
			const filters = document.querySelectorAll('.filter-btn');
			filters.forEach(b=>b.addEventListener('click',()=>{
				filters.forEach(x=>x.classList.remove('active'));
				b.classList.add('active');
				applyFilters();
			}));

			document.getElementById('search').addEventListener('input',applyFilters);
		}

		function applyFilters(){
			const active = document.querySelector('.filter-btn.active')?.dataset?.area || 'all';
			const q = document.getElementById('search').value.trim().toLowerCase();
			const items = window.__PROJECTS || [];
			const filtered = items.filter(p=>{
				const matchArea = (active==='all') || (p.area.key===active);
				const matchQuery = !q || p.title.toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q);
				return matchArea && matchQuery;
			});
			renderGrid(filtered);
		}

		// inicialização
		document.addEventListener('DOMContentLoaded', async ()=>{
			document.getElementById('orgName').textContent = ORG_DEFAULT;
			document.getElementById('loadBtn').addEventListener('click', ()=>{
				const token = document.getElementById('token').value.trim();
				loadProjects(token).then(()=>applyFilters());
			});
			setupControls();
			// carrega automaticamente sem token
			loadProjects().then(()=>applyFilters());
		});
	</script>
</head>
<body>
	<div class="container">
		<header>
			<img src="https://conselt.com.br/wp-content/uploads/2024/03/logo-1.png" alt="CONSELT logo">
			<div class="titles">
				<h1>Projetos CONSELT</h1>
				<p>Organização de projetos técnicos da Empresa Júnior de Engenharia Elétrica da UFU</p>
			</div>
			<div class="links">
				<a href="https://conselt.com.br" target="_blank">Site</a>
				<a href="https://www.instagram.com/conselt_ej" target="_blank">Instagram</a>
				<a href="https://www.linkedin.com/company/conselt/" target="_blank">LinkedIn</a>
				<a href="https://wa.link/uzdmop" target="_blank">WhatsApp</a>
			</div>
		</header>

		<div class="controls">
			<div class="search"><input id="search" type="search" placeholder="Pesquisar projetos por nome ou descrição..." /></div>
			<div class="filters">
				<button class="badge-btn filter-btn active" data-area="all">Todos</button>
				<button class="badge-btn filter-btn" data-area="web-dev">🌐 Web Dev</button>
				<button class="badge-btn filter-btn" data-area="luminotecnica">💡 Luminotécnica</button>
				<button class="badge-btn filter-btn" data-area="itel">⚡ ITEL</button>
				<button class="badge-btn filter-btn" data-area="automacao-residencial">🏠 Automação</button>
				<button class="badge-btn filter-btn" data-area="outros">📁 Outros</button>
			</div>
			<div style="margin-left:auto;display:flex;gap:8px;align-items:center">
				<input id="token" placeholder="Token GitHub (opcional)" style="background:transparent;border:1px solid #25303a;color:inherit;padding:8px;border-radius:8px" />
				<button id="loadBtn" class="badge-btn">Carregar</button>
			</div>
		</div>

		<p id="status" style="color:var(--muted);margin-top:12px">Carregando projetos...</p>

		<main class="grid" id="grid" aria-live="polite">
			<!-- cards são injetados aqui -->
		</main>

		<footer>Desenvolvido por CONSELT | conselt.com.br | contato@conselt.com.br</footer>
	</div>
</body>
</html>
